services:
  vps-portal:
    build: .
    container_name: vps-portal
    restart: unless-stopped
    environment:
      - OVH_ENDPOINT=${OVH_ENDPOINT:-ovh-ca}
      - OVH_APPLICATION_KEY=${OVH_APPLICATION_KEY}
      - OVH_APPLICATION_SECRET=${OVH_APPLICATION_SECRET}
      - OVH_CONSUMER_KEY=${OVH_CONSUMER_KEY}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - VIEWER_USERNAME=${VIEWER_USERNAME:-viewer}
      - VIEWER_PASSWORD_HASH=${VIEWER_PASSWORD_HASH}
    networks:
      - caddy_net
    # ── caddy-docker-proxy auto-registration ────────────────────────
    # These labels are read by lucaslorentz/caddy-docker-proxy running
    # on the same Docker network. No manual Caddyfile editing needed.
    labels:
      # Virtual host — must match your DNS record
      caddy: vps-control.pscp-css.support

      # Proxy to this container on port 5000
      caddy.reverse_proxy: "{{upstreams 5000}}"

      # Forward real client IP to Flask
      caddy.reverse_proxy.header_up: "X-Real-IP {remote_host}"

      # Security headers
      caddy.header.Strict-Transport-Security: '"max-age=31536000; includeSubDomains; preload"'
      caddy.header.X-Content-Type-Options: '"nosniff"'
      caddy.header.X-Frame-Options: '"DENY"'
      caddy.header.Referrer-Policy: '"strict-origin-when-cross-origin"'

networks:
  caddy_net:
    external: true
    name: caddy_net
